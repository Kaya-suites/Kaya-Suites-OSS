name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome! Note that BSL-licensed features (auth, billing, metering) are
        not open to external code contributions, but design input is always appreciated.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you felt something was missing or frustrating
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? A sketch, mockup, or just plain text is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this affect?
      multiple: true
      options:
        - Document management
        - AI editing loop
        - Search
        - Auth / accounts
        - Billing
        - OSS binary / self-hosting
        - API / integrations
        - Other
    validations:
      required: true
