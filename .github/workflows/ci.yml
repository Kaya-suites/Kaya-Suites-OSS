name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust — test workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/backend/Cargo.lock') }}

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo test --workspace
        run: TRYBUILD=overwrite cargo test --workspace
        # TRYBUILD=overwrite regenerates .stderr fixtures on first run.
        # On subsequent runs trybuild validates against the committed fixtures.

  frontend:
    name: Frontend — pnpm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm build
