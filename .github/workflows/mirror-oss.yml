name: Mirror OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip EE code
        run: bash scripts/strip-ee.sh

      - name: Push to public mirror
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          if [[ -z "$OSS_PAT" ]]; then
            echo "ERROR: OSS_PAT secret is not set." >&2
            exit 1
          fi

          git config user.email "mirror-bot@kaya-suites.com"
          git config user.name "Kaya OSS Mirror"

          git remote add public https://x-access-token:${OSS_PAT}@github.com/Kaya-suites/Kaya-Suites-OSS.git
          git push public HEAD:main --force
