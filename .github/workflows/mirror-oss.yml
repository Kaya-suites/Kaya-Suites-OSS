name: Mirror OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip EE code
        run: bash scripts/strip-ee.sh

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OSS_APP_ID }}
          private-key: ${{ secrets.OSS_APP_PRIVATE_KEY }}
          owner: Kaya-suites
          repositories: Kaya-Suites-OSS

      - name: Push to public mirror
        run: |
          git config user.email "mirror-bot@kaya-suites.com"
          git config user.name "Kaya OSS Mirror"

          git remote add public https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Kaya-suites/Kaya-Suites-OSS.git
          git push public HEAD:main --force
