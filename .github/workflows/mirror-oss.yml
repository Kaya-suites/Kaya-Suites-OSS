name: Mirror OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    if: github.repository == 'Kaya-suites/kaya-suites'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip EE code
        run: |
          bash scripts/strip-ee.sh
          git config user.email "mirror-bot@kaya-suites.com"
          git config user.name "Kaya OSS Mirror"
          git add -A

      - name: Diagnostics
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          echo "=== Git state ==="
          git log --oneline -5
          git status

          echo "=== Verifying OSS_PAT is set ==="
          if [[ -z "$OSS_PAT" ]]; then
            echo "ERROR: OSS_PAT secret is not set." >&2
            exit 1
          fi
          echo "OSS_PAT is set."

          echo "=== Checking OSS repo accessibility ==="
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${OSS_PAT}" \
            https://api.github.com/repos/Kaya-suites/Kaya-Suites-OSS)
          echo "GitHub API response: $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "ERROR: Cannot access OSS repo (HTTP $HTTP_CODE). Check PAT scope and repo name." >&2
            exit 1
          fi

          echo "=== Checking push permission ==="
          PUSH_ACCESS=$(curl -sf \
            -H "Authorization: token ${OSS_PAT}" \
            https://api.github.com/repos/Kaya-suites/Kaya-Suites-OSS \
            | jq -r '.permissions.push')
          echo "Push access: $PUSH_ACCESS"
          if [[ "$PUSH_ACCESS" != "true" ]]; then
            echo "ERROR: PAT does not have push access to OSS repo." >&2
            exit 1
          fi

      - name: Push to public mirror
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git remote add public https://x-access-token:${OSS_PAT}@github.com/Kaya-suites/Kaya-Suites-OSS.git

          # Fetch the current OSS HEAD so we can parent the new commit off it,
          # building an independent OSS history with no link to private commits.
          git fetch public main:refs/remotes/public/main 2>/dev/null || true
          PREV_OSS=$(git rev-parse refs/remotes/public/main 2>/dev/null || echo "")

          # Capture the stripped working tree as a git tree object.
          STRIPPED_TREE=$(git write-tree)

          # Build the commit message from the private commit that triggered this run.
          COMMIT_MSG=$(git log -1 --format="%s%n%n%b" HEAD)

          # Create a new commit whose parent is the previous OSS commit (not the
          # private repo commit). This severs the history link: no ancestor of the
          # OSS commit ever contains EE files.
          if [ -n "$PREV_OSS" ]; then
            OSS_COMMIT=$(git commit-tree "$STRIPPED_TREE" -p "$PREV_OSS" -m "$COMMIT_MSG")
          else
            OSS_COMMIT=$(git commit-tree "$STRIPPED_TREE" -m "$COMMIT_MSG")
          fi

          git push public "${OSS_COMMIT}:refs/heads/main" --force
          echo "Mirror push complete. OSS commit: $OSS_COMMIT"
