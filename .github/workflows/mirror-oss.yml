name: Mirror OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    if: github.repository == 'Kaya-suites/kaya-suites'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip EE code
        run: |
          bash scripts/strip-ee.sh
          git config user.email "mirror-bot@kaya-suites.com"
          git config user.name "Kaya OSS Mirror"
          git add -A
          git commit -m "Strip EE code for OSS mirror"

      - name: Diagnostics
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          echo "=== Git state ==="
          git log --oneline -5
          git status

          echo "=== Verifying OSS_PAT is set ==="
          if [[ -z "$OSS_PAT" ]]; then
            echo "ERROR: OSS_PAT secret is not set." >&2
            exit 1
          fi
          echo "OSS_PAT is set."

          echo "=== Checking OSS repo accessibility ==="
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${OSS_PAT}" \
            https://api.github.com/repos/Kaya-suites/Kaya-Suites-OSS)
          echo "GitHub API response: $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "ERROR: Cannot access OSS repo (HTTP $HTTP_CODE). Check PAT scope and repo name." >&2
            exit 1
          fi

          echo "=== Checking push permission ==="
          PUSH_ACCESS=$(curl -sf \
            -H "Authorization: token ${OSS_PAT}" \
            https://api.github.com/repos/Kaya-suites/Kaya-Suites-OSS \
            | jq -r '.permissions.push')
          echo "Push access: $PUSH_ACCESS"
          if [[ "$PUSH_ACCESS" != "true" ]]; then
            echo "ERROR: PAT does not have push access to OSS repo." >&2
            exit 1
          fi

      - name: Push to public mirror
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          # Remove the GITHUB_TOKEN credential helper injected by actions/checkout
          # so our PAT is used instead of github-actions[bot].
          git config --unset-all http.https://github.com/.extraheader || true

          git remote add public https://x-access-token:${OSS_PAT}@github.com/Kaya-suites/Kaya-Suites-OSS.git
          git push public HEAD:main --force
          echo "Mirror push complete."
